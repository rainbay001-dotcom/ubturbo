name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    # Optional: Only run on specific file changes
    # paths:
    #   - "src/**/*.ts"
    #   - "src/**/*.tsx"
    #   - "src/**/*.js"
    #   - "src/**/*.jsx"

jobs:
  claude-review:
    # Restrict auto-review to PRs authored by trusted users (repo owner +
    # invited collaborators). External contributors' PRs won't trigger the
    # bot — saves token quota and avoids prompt-injection surface on a
    # public repo.
    if: |
      github.event.pull_request.author_association == 'OWNER' ||
      github.event.pull_request.author_association == 'MEMBER' ||
      github.event.pull_request.author_association == 'COLLABORATOR'

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Full history so the reviewer can see prior commits on the
          # PR branch, not just the tip.
          fetch-depth: 0

      - name: Checkout openEuler kernel reference (OLK-6.6)
        uses: actions/checkout@v4
        with:
          # Cross-repo checkout so the reviewer can read OLK-6.6 source
          # (drivers/ub, include/ub, mm, kernel/sched, etc.) when reasoning
          # about kernel APIs the PR touches. Both repos are public, so
          # the default GITHUB_TOKEN read scope works without a PAT.
          # Working tree only (~1.7 GB); no history needed for source reads.
          repository: rainbay001-dotcom/openEuler
          ref: OLK-6.6
          path: vendor/openeuler-kernel
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          prompt: '/code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }}'
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options
